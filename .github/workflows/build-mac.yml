name: Build Mac Desktop Pet

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pynput Pillow pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --windowed --icon="tray_icon.icns" --add-data "assets:assets" main.py

    - name: Upload Mac App
      uses: actions/upload-artifact@v4
      with:
        name: LeiSongran-Mac-Version
        path: dist/main.app
